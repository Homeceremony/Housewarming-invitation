<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>House Warming Invitation</title>

<style>
body{
    margin:0;
    padding:0;
    background:#8b0000;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    font-family:Arial, Helvetica, sans-serif;
}

.invitation-container{
    max-width:700px;
    width:95%;
    background:white;
    border:8px solid #f4c430;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
    overflow:hidden;
}

.invitation-container img{
    width:100%;
    display:block;
}

.footer{
    text-align:center;
    padding:10px;
    background:#f9f1dc;
    font-size:14px;
}
</style>
</head>

<body>

<div class="invitation-container">

<img src="invitation.jpg" alt="House Warming Invitation">

<div class="footer">
🙏 We look forward to your presence with family 🙏
</div>

</div>

</body>
</html>
