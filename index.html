    /* ── Modal ── */

      max-height: 90vh; overflow-y: auto;
      position: relative; z-index: 9999;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);

    /* ── Header ── */
    .modal-header {
      background: linear-gradient(0deg, #0279FF 0%, #00A3F3 100%);
      color: #fff; padding: 16px 20px;
      border-radius: 8px 8px 0 0;
      display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; z-index: 10;
    }
    .modal-header h2 { margin: 0; font-size: 18px; font-family: Arial; }
    .modal-close { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; line-height: 1; }

    /* ── Form wrapper ── */
    .form-body { padding: 24px 28px; }

    /* ── 2-column grid ── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px 24px;
    }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group.full-width { grid-column: 1 / -1; }

    .form-group label {
      font-size: 12px; font-family: Arial;
      color: #313949; font-weight: 600;
    }
    .form-group label span { color: red; }

    .form-group input[type=text],
    .form-group textarea,
    .form-group select {
      width: 100%;
      border: 1px solid #c0c6cc;
      border-radius: 4px;
      padding: 7px 10px;
      font-size: 13px;
      font-family: Arial;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input[type=text]:focus,
    .form-group textarea:focus,
    .form-group select:focus { border-color: #0279FF; }

    .form-group textarea { resize: vertical; min-height: 80px; }

    /* ── Captcha row ── */
    .captcha-row {
      display: flex; align-items: center; gap: 16px;
      margin-top: 4px; flex-wrap: wrap;
    }
    .captcha-row input { width: 160px; }
    .captcha-row img { height: 40px; border-radius: 4px; border: 1px solid #c0c6cc; }
    .captcha-row a { font-size: 12px; color: #0279FF; text-decoration: none; }
    .captcha-row a:hover { text-decoration: underline; }

    /* ── Buttons ── */
    .btn-row { display: flex; gap: 10px; margin-top: 20px; }
    .btn-submit {
      background: linear-gradient(0deg, #0279FF 0%, #00A3F3 100%);
      color: #fff; border: none; padding: 9px 28px;
      border-radius: 4px; font-size: 13px; cursor: pointer;
    }
    .btn-submit:hover { background: linear-gradient(#02acff 0, #006be4 100%); }
    .btn-reset {
      background: #fff; color: #313949;
      border: 1px solid #c0c6cc; padding: 9px 20px;
      border-radius: 4px; font-size: 13px; cursor: pointer;
    }
    .btn-reset:hover { background: #f5f5f5; }

    /* ── Responsive ── */
    @media (max-width: 560px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-group.full-width { grid-column: 1; }
      .form-body { padding: 16px; }

      document.body.style.overflow = 'hidden';

    function closeQuotePopup() {
      document.getElementById('quoteOverlay').classList.remove('active');
      document.body.style.overflow = '';

    function closeOnOverlay(e) {
